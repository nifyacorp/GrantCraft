steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/owl-app', '-f', 'Dockerfile.cloudrun', '.']
    
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/owl-app']
    
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'owl-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/owl-app'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--port'
      - '8080'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600s'
      - '--concurrency'
      - '80'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GRADIO_SERVER_NAME=0.0.0.0,GRADIO_SERVER_PORT=8080'

substitutions:
  _REGION: us-central1  # Default region, can be overridden

images:
  - 'gcr.io/$PROJECT_ID/owl-app'