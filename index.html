<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrantCraft - AI-Powered Grant Writing Assistant</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Netlify SPA redirect script -->
  <script type="text/javascript">
    // This script checks to see if a redirect is present in the query string
    // and converts it back into the correct URL that should be in the browser
    // address bar (only needed when hosting on Netlify)
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="./src/index.js"></script>
</body>
</html>
